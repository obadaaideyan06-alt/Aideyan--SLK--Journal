function loadTrades(){

// ── HELPERS ───────────────────────────────────────────────────────
function greet(){const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening";}
function fmtMoney(n){return n>=0?`+$${Math.abs(n).toFixed(2)}`:`-$${Math.abs(n).toFixed(2)}`;}
function todayStr(){return new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}

function calcPnL(t){
  const entry=parseFloat(t.entryPrice),exit=parseFloat(t.exitPrice),lot=parseFloat(t.lotSize),sl=parseFloat(t.stopLoss),tp=parseFloat(t.takeProfit);
  if(!entry||!lot)return{pnl:"",rrRisk:"",rrActual:""};
  const isCrypto=CRYPTO_PAIRS.includes(t.pair),isSynth=SYNTHETIC_INDICES.includes(t.pair),pipVal=t.pair.includes("JPY")?0.01:0.0001;
  let pnl="";
  if(exit){const diff=t.direction==="Long"?exit-entry:entry-exit;pnl=(isCrypto||isSynth?diff*lot:(diff/pipVal)*10*lot).toFixed(2);}
  let rrRisk="",rrActual="";
  if(sl){const slD=Math.abs(entry-sl);if(tp)rrRisk=(Math.abs(tp-entry)/slD).toFixed(2);if(exit)rrActual=(Math.abs(exit-entry)/slD).toFixed(2);}
  return{pnl,rrRisk,rrActual};
}

function fileToB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}

function showToast(msg,type="info"){
  toast={msg,type};
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{toast={msg:"",type:"info"};render();},3000);
  render();
}

function setupColor(v){return v.includes("A-Shape")?"#fc8181":v.includes("V-Shape")?"#68d391":v.includes("Disrespected")?"#f6ad55":"#a78bfa";}
function setupIcon(v){const s=ENTRY_SETUPS.find(e=>e.value===v);return s?s.icon:"◈";}

// ── STATS ─────────────────────────────────────────────────────────
function getStats(){
  const closed=trades.filter(t=>t.result!=="Running"&&t.pnl!=="");
  const totalPnl=closed.reduce((a,t)=>a+parseFloat(t.pnl||0),0);
  const wins=closed.filter(t=>t.result==="Win"||parseFloat(t.pnl)>0);
  const losses=closed.filter(t=>t.result==="Loss"||parseFloat(t.pnl)<0);
  const winRate=closed.length?Math.round(wins.length/closed.length*100):0;
  const avgWin=wins.length?wins.reduce((a,t)=>a+parseFloat(t.pnl),0)/wins.length:0;
  const avgLoss=losses.length?losses.reduce((a,t)=>a+parseFloat(t.pnl),0)/losses.length:0;
  const rrRatio=avgLoss!==0?Math.abs(avgWin/avgLoss).toFixed(2):"—";
  const rrs=trades.filter(t=>t.rrRisk);
  const avgRRPlan=rrs.length?(rrs.reduce((a,t)=>a+parseFloat(t.rrRisk),0)/rrs.length).toFixed(2):"—";
  let streak=0;for(const t of trades){if(t.result==="Win")streak++;else break;}
  return{closed,totalPnl,wins,losses,winRate,avgWin,avgLoss,rrRatio,avgRRPlan,streak};
}

// ── NOTION EXPORT ─────────────────────────────────────────────────
function exportToNotion(){
  if(!trades.length){showToast("No trades to export.","error");return;}
  const lines=[`# ${JOURNAL_TITLE}`,`> ${CONCEPT} | Exported ${new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})}`,"","---",""];
  trades.forEach((t,i)=>{
    lines.push(`## Trade ${i+1} — ${t.pair} ${t.direction} | ${t.date}`,"");
    lines.push(`| Field | Value |`,`|---|---|`,`| Pair | ${t.pair} |`,`| Direction | ${t.direction} |`,`| Date | ${t.date} |`,`| Session | ${t.session} |`,`| Entry Setup | ${t.entrySetup} |`,`| HTF Timeframe | ${t.htfTimeframe} |`,`| Entry Timeframe | ${t.entryTimeframe} |`,`| Entry Price | ${t.entryPrice||"—"} |`,`| Exit Price | ${t.exitPrice||"Running"} |`,`| Lot Size | ${t.lotSize||"—"} |`,`| Stop Loss | ${t.stopLoss||"—"} |`,`| Take Profit | ${t.takeProfit||"—"} |`,`| Planned R:R | ${t.rrRisk||"—"} |`,`| Actual R:R | ${t.rrActual||"—"} |`,`| P&L | ${t.pnl?fmtMoney(parseFloat(t.pnl)):"—"} |`,`| Result | ${t.result} |`,`| Days Held | ${t.daysHeld||"—"} |`,`| Emotion | ${t.emotion} |`,"");
    if(t.rationale){lines.push(`**Rationale:** ${t.rationale}`,"");}
    if(t.tradeManagement){lines.push(`**Trade Management:** ${t.tradeManagement}`,"");}
    if(t.mistakes){lines.push(`**Mistakes:** ${t.mistakes}`,"");}
    if(t.lessons){lines.push(`**Lessons:** ${t.lessons}`,"");}
    if(t.tags){lines.push(`**Tags:** ${t.tags}`,"");}
    lines.push("---","");
  });
  const blob=new Blob([lines.join("\n")],{type:"text/markdown;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`Aideyan-SLK-Journal-${new Date().toISOString().slice(0,10)}.md`;a.click();URL.revokeObjectURL(url);
  showToast("Exported! Import the .md file into Notion.","success");
}

// ── RENDER HELPERS ────────────────────────────────────────────────
function renderMd(text){
  if(!text)return"";
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong style="color:#e8eaf0">$1</strong>')
    .replace(/^### (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:#a78bfa;margin:16px 0 5px;letter-spacing:.05em;text-transform:uppercase">$1</div>')
    .replace(/^## (.+)$/gm,'<div style="font-size:15px;font-weight:700;color:#e8eaf0;margin:18px 0 7px">$1</div>')
    .replace(/^# (.+)$/gm,'<div style="font-size:17px;font-weight:800;color:#e8eaf0;margin:18px 0 9px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="display:flex;gap:8px;margin:5px 0;color:#c8d0e0"><span style="color:#a78bfa;flex-shrink:0">▸</span><span>$1</span></div>')
    .replace(/\n/g,'<br/>');
}

function setupBadge(v){const s=ENTRY_SETUPS.find(e=>e.value===v);const col=setupColor(v);return s?badge(`${s.icon} ${v}`,col):""; }
function resultColor(r){return r==="Win"?"#68d391":r==="Loss"?"#fc8181":r==="Break Even"?"#f6ad55":"#6b7a99";}

function statCard(label,value,sub,color,glow){

// ── IMAGE EVENTS ──────────────────────────────────────────────────
async function handleImgFile(e,id){
  const f=e.target.files[0];if(!f)return;
  const d=await fileToB64(f);
  if(id==="beforeImage")currentForm.beforeImage=d;
  else if(id==="afterImage")currentForm.afterImage=d;
  else if(id==="mt5Image")currentForm.mt5Image=d;
  render();
}
function removeImg(id){
  if(id==="beforeImage")currentForm.beforeImage=null;
  else if(id==="afterImage")currentForm.afterImage=null;
  else if(id==="mt5Image")currentForm.mt5Image=null;
  render();
}
async function handleSetupFiles(e){
  for(const f of e.target.files){
    if(!f.type.startsWith("image/"))continue;
    const d=await fileToB64(f);
    currentForm.setupImages.push({dataUrl:d,caption:""});
  }
  render();
}
function removeSetupImg(i){currentForm.setupImages.splice(i,1);render();}
function updateSetupCaption(i,v){currentForm.setupImages[i].caption=v;}
function openLightbox(id){
  lightboxSrc=id==="beforeImage"?currentForm.beforeImage:id==="afterImage"?currentForm.afterImage:currentForm.mt5Image;
  render();
}
function openSetupLightbox(i){lightboxSrc=currentForm.setupImages[i]?.dataUrl;render();}
function openTradeLightbox(src){lightboxSrc=src;render();}
function closeLightbox(){lightboxSrc=null;render();}

// ── FORM EVENTS ───────────────────────────────────────────────────
function setField(k,v){
  currentForm[k]=v;
  const{pnl,rrRisk,rrActual}=calcPnL(currentForm);
  currentForm.pnl=pnl;currentForm.rrRisk=rrRisk;currentForm.rrActual=rrActual;
  render();
}
function setDirection(d){setField("direction",d);}
function setEmotion(l){setField("emotion",l);}
function setSetup(v){setField("entrySetup",v);}
function setPair(p){currentForm.pair=p;pairSearch="";showPairDrop=false;const{pnl,rrRisk,rrActual}=calcPnL(currentForm);currentForm.pnl=pnl;currentForm.rrRisk=rrRisk;currentForm.rrActual=rrActual;render();}
function onPairSearch(v){pairSearch=v;showPairDrop=true;render();}
function togglePairDrop(){showPairDrop=!showPairDrop;render();}
function hidePairDrop(){setTimeout(()=>{showPairDrop=false;render();},180);}

async function submitTrade(){
  if(!currentForm.pair||!currentForm.entryPrice||!currentForm.date){showToast("Fill in Date, Pair and Entry Price.","error");return;}
  const trade={...currentForm,setupImages:[...currentForm.setupImages],id:editingId||Date.now()};
  if(editingId){trades=trades.map(t=>t.id===editingId?trade:t);}else{trades=[trade,...trades];}
  saveTrades();
  editingId=null;
  aiFeedback="";
  aiLoading=true;
  currentView="dashboard";
  currentForm=emptyTrade();
  showToast(editingId?"Trade updated.":"Trade saved — AI feedback loading…","success");
  render();
  const fb=await getAIFeedback(trade);
  aiFeedback=fb;aiLoading=false;render();
}

function editTrade(id){
  const t=trades.find(t=>t.id===id);if(!t)return;
  currentForm={...t,setupImages:[...(t.setupImages||[])],beforeImage:t.beforeImage||null,afterImage:t.afterImage||null,mt5Image:t.mt5Image||null};
  editingId=id;currentView="log";selectedTradeId=null;render();
}
function deleteTrade(id){
  if(!confirm("Delete this trade?"))return;
  trades=trades.filter(t=>t.id!==id);saveTrades();selectedTradeId=null;render();showToast("Trade deleted.");
}
function cancelLog(){currentForm=emptyTrade();editingId=null;currentView="dashboard";render();}
function viewTrade(id){selectedTradeId=id;currentView="history";render();}
function backToHistory(){selectedTradeId=null;render();}

async function runAnalysis(){
  if(trades.length<2){showToast("Log at least 2 trades first.","error");return;}
  analysisLoading=true;analysis="";currentView="analysis";render();
  analysis=await getAnalysis();
  analysisLoading=false;render();
}

function setView(v){currentView=v;selectedTradeId=null;render();}

  app.innerHTML=`

// Service Worker (inline via blob)
const swCode = `
const CACHE = 'slk-journal-v1';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.open(CACHE).then(cache =>
      cache.match(e.request).then(cached => {
        const fresh = fetch(e.request).then(res => { cache.put(e.request, res.clone()); return res; }).catch(() => cached);
        return cached || fresh;
      })
    )
  );
});
`;
if ('serviceWorker' in navigator) {
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL, {scope:'./'}).then(() => {
    console.log('SLK Journal SW registered');
  }).catch(e => console.log('SW error:', e));
}

      document.getElementById('pwa-install-banner').style.display = 'none';
